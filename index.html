<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDQL Data — MLB &amp; WNBA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0d1117;
      --card:   #161b22;
      --row:    #1c2128;
      --border: #30363d;
      --sub:    #21262d;
      --hi:     #e6edf3;
      --lo:     #8b949e;
      --green:  #3fb950;
      --gbg:    #1a2e20;
      --gbd:    #238636;
      --blue:   #79c0ff;
      --bbg:    #132030;
      --bbd:    #388bfd;
      --amber:  #e3b341;
      --abg:    #2d2007;
      --red:    #f85149;
    }
    body { background:var(--bg); color:var(--hi); font-family:'Inter',system-ui,sans-serif; font-size:14px; line-height:1.6; min-height:100vh; }
    .shell { max-width:1100px; margin:0 auto; padding:2rem 1.5rem 4rem; }

    /* Top bar */
    .topbar { display:flex; align-items:center; gap:12px; margin-bottom:2rem; padding-bottom:1.25rem; border-bottom:.5px solid var(--border); }
    .logo { width:38px; height:38px; background:#1a7f4b; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; color:#fff; flex-shrink:0; }
    .topbar-title { font-size:17px; font-weight:500; }
    .topbar-sub   { font-size:13px; color:var(--lo); }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .update-badge { font-size:11px; color:var(--lo); background:var(--row); border:.5px solid var(--border); border-radius:4px; padding:3px 8px; white-space:nowrap; }

    /* Cards */
    .card { background:var(--card); border:.5px solid var(--border); border-radius:10px; padding:1.25rem 1.5rem; margin-bottom:1.25rem; }
    .card-label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--lo); font-weight:500; margin-bottom:.5rem; }

    /* Sport tabs */
    .sport-row { display:flex; gap:8px; margin-bottom:1.25rem; }
    .sport-btn { padding:5px 16px; border-radius:5px; border:.5px solid var(--border); background:var(--bg); color:var(--lo); font-size:13px; cursor:pointer; transition:all .15s; font-family:inherit; }
    .sport-btn:hover  { border-color:var(--gbd); color:var(--green); }
    .sport-btn.active { background:var(--gbg); border-color:var(--gbd); color:var(--green); }

    /* Controls */
    .controls-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:1rem; }
    .search-wrap { position:relative; flex:1; min-width:180px; }
    .search-wrap i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--lo); font-size:16px; pointer-events:none; }
    input[type="text"] { width:100%; background:var(--bg); border:.5px solid var(--border); border-radius:6px; color:var(--hi); font-size:13px; padding:.5rem .75rem .5rem 2.25rem; outline:none; transition:border-color .15s; font-family:inherit; }
    input[type="text"]:focus { border-color:var(--bbd); }
    input[type="text"]::placeholder { color:var(--lo); }

    /* Results */
    .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; gap:8px; flex-wrap:wrap; }
    .row-count { font-size:13px; color:var(--lo); }
    .dl-btn { padding:5px 14px; background:var(--gbg); border:.5px solid var(--gbd); border-radius:5px; color:var(--green); font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; font-family:inherit; transition:all .15s; }
    .dl-btn:hover { background:#223e2b; }

    .table-wrap { overflow-x:auto; border:.5px solid var(--border); border-radius:6px; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th { background:var(--row); color:var(--lo); font-weight:500; padding:8px 12px; text-align:left; border-bottom:.5px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none; }
    th:hover { color:var(--hi); }
    th.asc::after  { content:' ↑'; opacity:1; }
    th.desc::after { content:' ↓'; opacity:1; }
    th::after      { content:' ↕'; opacity:.3; font-size:10px; }
    td { padding:7px 12px; border-bottom:.5px solid var(--sub); color:var(--hi); white-space:nowrap; }
    tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:var(--row); }

    /* Highlight cells with system picks */
    td.has-pick { color:var(--green); font-weight:500; }
    td.game-row-date { color:var(--amber); font-size:11px; }

    /* State */
    .state { text-align:center; padding:3rem 1rem; color:var(--lo); font-size:13px; }
    .state i { font-size:32px; display:block; margin-bottom:.75rem; opacity:.4; }

    /* Footer */
    .footer { text-align:center; font-size:12px; color:var(--lo); margin-top:2rem; border-top:.5px solid var(--border); padding-top:1.25rem; }
    .footer a { color:var(--blue); text-decoration:none; }

    .quick-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:.5rem; }
    .q-btn { padding:4px 12px; background:var(--row); border:.5px solid var(--border); border-radius:4px; font-size:12px; color:var(--lo); cursor:pointer; font-family:inherit; transition:all .15s; }
    .q-btn:hover  { border-color:var(--gbd); color:var(--green); }
    .q-btn.active { background:var(--gbg); border-color:var(--gbd); color:var(--green); }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinning { display:inline-block; animation:spin 1s linear infinite; }
    @media(max-width:520px){ .shell{ padding:1.25rem 1rem 3rem; } }
  </style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="logo" aria-hidden="true">S</div>
    <div>
      <div class="topbar-title">KillerSports Daily Picks</div>
      <div class="topbar-sub">MLB &amp; WNBA system alerts</div>
    </div>
    <div class="topbar-right">
      <span class="update-badge" id="updateBadge">Loading…</span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Sport</div>
    <div class="sport-row">
      <button class="sport-btn active" id="btn-mlb"  onclick="setSport('mlb')">MLB</button>
      <button class="sport-btn"        id="btn-wnba" onclick="setSport('wnba')">WNBA</button>
    </div>
    <div class="controls-row">
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" placeholder="Filter by team, starter, date…" oninput="renderTable()" />
      </div>
    </div>

    <div class="card-label" style="margin-top:.75rem">Quick filters</div>
    <div class="quick-row" id="quickRow"></div>
  </div>

  <div class="card" id="resultsCard">
    <div id="tableArea">
      <div class="state">
        <i class="ti ti-refresh spinning" aria-hidden="true"></i>
        Loading today's picks…
      </div>
    </div>
  </div>

  <div class="footer">
    Data refreshed daily at 10 AM via <a href="https://killersports.com" target="_blank" rel="noopener">KillerSports Pro</a>.
    Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>.
  </div>

</div>

<script>
  var allData  = { mlb: null, wnba: null };
  var sport    = 'mlb';
  var sortCol  = -1;
  var sortDir  = 'asc';

  // ── Boot ─────────────────────────────────────────
  (async function init() {
    try {
      var r = await fetch('data.json?_=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var d = await r.json();

      allData.mlb  = d.mlb  || { headers: [], rows: [] };
      allData.wnba = d.wnba || { headers: [], rows: [] };

      var ts = d.updated
        ? 'Updated ' + new Date(d.updated).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })
        : 'Data loaded';
      document.getElementById('updateBadge').textContent = ts;
      renderQuickButtons();
      renderTable();
    } catch(e) {
      document.getElementById('updateBadge').textContent = 'Error loading data';
      document.getElementById('tableArea').innerHTML =
        '<div class="state"><i class="ti ti-alert-circle" aria-hidden="true"></i>Could not load data.json.<br><small>' + e.message + '</small></div>';
    }
  })();

  // ── Sport toggle ─────────────────────────────────
  function setSport(s) {
    sport = s; sortCol = -1; sortDir = 'asc'; pickFilter = null;
    document.querySelectorAll('.sport-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-' + s).classList.add('active');
    document.getElementById('searchInput').value = '';
    renderQuickButtons();
    renderTable();
  }

  // ── Filter ───────────────────────────────────────
  function getFiltered() {
    var data = allData[sport];
    if (!data || !data.rows) return [];
    var search = document.getElementById('searchInput').value.toLowerCase().trim();

    return data.rows.filter(function(row) {
      // Text search
      if (search && !row.some(function(c){ return String(c||'').toLowerCase().includes(search); })) return false;
      // Pick column filter
      if (pickFilter) {
        var headers = data.headers;
        var colIdx = headers.findIndex(function(h){ return h.toUpperCase().includes(pickFilter.toUpperCase()); });
        if (colIdx >= 0 && (row[colIdx] === '-' || row[colIdx] === '' || row[colIdx] == null)) return false;
      }
      return true;
    });
  }

  // ── Render ────────────────────────────────────────
  function renderTable() {
    var data = allData[sport];
    if (!data || !data.headers.length) {
      document.getElementById('tableArea').innerHTML =
        '<div class="state"><i class="ti ti-mood-empty" aria-hidden="true"></i>No data available yet.</div>';
      return;
    }

    var filtered = getFiltered();
    var rows = filtered.slice();

    if (sortCol >= 0) {
      rows.sort(function(a, b) {
        var av = a[sortCol] || '', bv = b[sortCol] || '';
        var an = parseFloat(av), bn = parseFloat(bv);
        if (!isNaN(an) && !isNaN(bn)) return sortDir === 'asc' ? an - bn : bn - an;
        return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
      });
    }

    var headers = data.headers;

    // Find columns that have any pick data (non "-" and non empty)
    var pickCols = {};
    rows.forEach(function(row) {
      row.forEach(function(c, i) {
        if (c && c !== '-' && i > 0) pickCols[i] = true;
      });
    });

    var thead = '<thead><tr>' + headers.map(function(h, i) {
      var cls = sortCol === i ? sortDir : '';
      return '<th class="' + cls + '" onclick="sortBy(' + i + ')">' + esc(h) + '</th>';
    }).join('') + '</tr></thead>';

    var tbody = '<tbody>' + rows.map(function(row) {
      var isAt = row[0] === '@';
      return '<tr>' + row.map(function(c, i) {
        var val = c != null ? c : '';
        var cls = '';
        if (i === 0 && !isAt && val !== '@') cls = 'game-row-date';
        if (i > 0 && val !== '-' && val !== '' && pickCols[i]) cls = 'has-pick';
        return '<td' + (cls ? ' class="' + cls + '"' : '') + '>' + esc(val) + '</td>';
      }).join('') + '</tr>';
    }).join('') + '</tbody>';

    var count = rows.length + ' row' + (rows.length !== 1 ? 's' : '');

    document.getElementById('tableArea').innerHTML =
      '<div class="results-header">' +
        '<span class="row-count">' + count + '</span>' +
        '<button class="dl-btn" onclick="downloadCSV()">' +
          '<i class="ti ti-download" aria-hidden="true"></i> Download CSV' +
        '</button>' +
      '</div>' +
      '<div class="table-wrap"><table>' + thead + tbody + '</table></div>';
  }

  // ── Sort ──────────────────────────────────────────
  function sortBy(col) {
    sortDir = sortCol === col ? (sortDir === 'asc' ? 'desc' : 'asc') : 'asc';
    sortCol = col;
    renderTable();
  }

  // ── Download CSV ──────────────────────────────────
  function downloadCSV() {
    var data = allData[sport];
    if (!data) return;
    var rows = getFiltered();
    var lines = [data.headers.map(csvCell).join(',')];
    rows.forEach(function(row) {
      lines.push(row.map(function(c){ return csvCell(c != null ? c : ''); }).join(','));
    });
    var blob = new Blob([lines.join('\r\n')], { type:'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = sport + '_picks_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(a.href);
  }


  // ── Quick filters ─────────────────────────────────
  var QUICK = {
    mlb: [
      { label: 'All games',      fn: function(){ clearSearch(); } },
      { label: 'Has ML pick',    fn: function(){ setSearch(''); setPickFilter('ML'); } },
      { label: 'Has OU pick',    fn: function(){ setSearch(''); setPickFilter('OU'); } },
      { label: 'Home teams',     fn: function(){ setSearch(''); setPickFilter(null); } },
      { label: 'Favorites',      fn: function(){ setSearch('-1'); } },
      { label: 'Dogs',           fn: function(){ setSearch('+1'); } },
    ],
    wnba: [
      { label: 'All games',      fn: function(){ clearSearch(); } },
      { label: 'Has ATS pick',   fn: function(){ setSearch(''); setPickFilter('ATS'); } },
      { label: 'Has OU pick',    fn: function(){ setSearch(''); setPickFilter('OU'); } },
      { label: 'Has SU pick',    fn: function(){ setSearch(''); setPickFilter('SU'); } },
    ]
  };
  var activeQuick = null;
  var pickFilter  = null;

  function renderQuickButtons() {
    var container = document.getElementById('quickRow');
    var btns = QUICK[sport] || [];
    container.innerHTML = btns.map(function(b, i) {
      return '<button class="q-btn" onclick="runQuick(' + i + ')">' + b.label + '</button>';
    }).join('');
  }

  function runQuick(i) {
    pickFilter = null;
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.q-btn').forEach(function(b, j){ b.classList.toggle('active', j === i); });
    var btn = (QUICK[sport] || [])[i];
    if (btn) btn.fn();
    renderTable();
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    pickFilter = null;
  }

  function setSearch(val) {
    document.getElementById('searchInput').value = val;
  }

  function setPickFilter(col) {
    pickFilter = col;
  }

  function csvCell(v) {
    var s = String(v);
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g,'""') + '"' : s;
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
