<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportScraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--card:#161b22;--row:#1c2128;--border:#30363d;--sub:#21262d;
      --hi:#e6edf3;--lo:#8b949e;
      --green:#3fb950;--gbg:#1a2e20;--gbd:#238636;
      --blue:#79c0ff;--bbg:#132030;--bbd:#388bfd;
      --amber:#e3b341;--abg:#2d2007;--abd:#9e6a03;
      --red:#f85149;--rbg:#2d1117;--rbd:#b62324;
      --purple:#bc8cff;
    }
    body{background:var(--bg);color:var(--hi);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
    .shell{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem}

    /* Top bar */
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:.5px solid var(--border)}
    .logo{width:38px;height:38px;background:#1a7f4b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
    .topbar-title{font-size:17px;font-weight:500}
    .topbar-sub{font-size:13px;color:var(--lo)}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .update-badge{font-size:11px;color:var(--lo);background:var(--row);border:.5px solid var(--border);border-radius:4px;padding:3px 8px;white-space:nowrap}
    .icon-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--row);border:.5px solid var(--border);border-radius:5px;cursor:pointer;color:var(--lo);font-size:16px;transition:all .15s}
    .icon-btn:hover{color:var(--hi);border-color:var(--bbd)}
    .icon-btn.active{color:var(--blue);border-color:var(--bbd);background:var(--bbg)}

    /* Cards */
    .card{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1rem}
    .card-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--lo);font-weight:500;margin-bottom:.5rem}

    /* Sport tabs */
    .sport-row{display:flex;gap:8px;margin-bottom:1rem}
    .sport-btn{padding:5px 16px;border-radius:5px;border:.5px solid var(--border);background:var(--bg);color:var(--lo);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit}
    .sport-btn:hover{border-color:var(--gbd);color:var(--green)}
    .sport-btn.active{background:var(--gbg);border-color:var(--gbd);color:var(--green)}

    /* Filter grid */
    .filter-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:.75rem}
    @media(max-width:700px){.filter-grid{grid-template-columns:1fr 1fr}}
    .filter-group{display:flex;flex-direction:column;gap:4px}
    .filter-group label{font-size:11px;color:var(--lo);text-transform:uppercase;letter-spacing:.06em}
    select,input[type="text"],input[type="date"]{
      width:100%;background:var(--bg);border:.5px solid var(--border);border-radius:6px;
      color:var(--hi);font-size:13px;padding:.45rem .75rem;outline:none;
      transition:border-color .15s;font-family:inherit;
    }
    select:focus,input[type="text"]:focus,input[type="date"]:focus{border-color:var(--bbd)}
    input::placeholder{color:var(--lo)}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5)}

    /* Quick filter chips */
    .chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:.5rem}
    .chip{padding:3px 12px;border-radius:12px;border:.5px solid var(--border);background:var(--row);color:var(--lo);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
    .chip:hover{border-color:var(--gbd);color:var(--green)}
    .chip.active{background:var(--gbg);border-color:var(--gbd);color:var(--green)}

    /* Column toggle panel */
    .col-panel{display:none;margin-top:.75rem;padding-top:.75rem;border-top:.5px solid var(--border)}
    .col-panel.open{display:block}
    .col-panel-inner{display:flex;gap:6px;flex-wrap:wrap}
    .col-toggle{padding:3px 10px;border-radius:4px;border:.5px solid var(--border);background:var(--row);color:var(--lo);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:5px}
    .col-toggle.visible{background:var(--bbg);border-color:var(--bbd);color:var(--blue)}
    .col-toggle i{font-size:12px}

    /* Date range panel */
    .date-panel{display:none;margin-top:.75rem;padding-top:.75rem;border-top:.5px solid var(--border)}
    .date-panel.open{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .date-panel label{font-size:12px;color:var(--lo)}
    .date-panel input{width:150px}
    .clear-btn{padding:4px 10px;background:transparent;border:.5px solid var(--border);border-radius:5px;color:var(--lo);font-size:12px;cursor:pointer;font-family:inherit}
    .clear-btn:hover{border-color:var(--rbd);color:var(--red)}

    /* Results */
    .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:8px;flex-wrap:wrap}
    .row-count{font-size:13px;color:var(--lo)}
    .dl-btn{padding:5px 14px;background:var(--gbg);border:.5px solid var(--gbd);border-radius:5px;color:var(--green);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s}
    .dl-btn:hover{background:#223e2b}

    .table-wrap{overflow-x:auto;border:.5px solid var(--border);border-radius:6px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:var(--row);color:var(--lo);font-weight:500;padding:8px 12px;text-align:left;border-bottom:.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
    th:hover{color:var(--hi)}
    th.asc::after{content:' ↑';opacity:1}
    th.desc::after{content:' ↓';opacity:1}
    th::after{content:' ↕';opacity:.3;font-size:10px}
    td{padding:7px 12px;border-bottom:.5px solid var(--sub);color:var(--hi);white-space:nowrap}
    tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:var(--row)}
    td.has-pick{color:var(--green);font-weight:600}
    td.date-cell{color:var(--amber);font-size:11px}
    td.at-cell{color:var(--lo)}

    .state{text-align:center;padding:3rem 1rem;color:var(--lo);font-size:13px}
    .state i{font-size:32px;display:block;margin-bottom:.75rem;opacity:.4}

    .footer{text-align:center;font-size:12px;color:var(--lo);margin-top:2rem;border-top:.5px solid var(--border);padding-top:1.25rem}
    .footer a{color:var(--blue);text-decoration:none}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spinning{display:inline-block;animation:spin 1s linear infinite}
  </style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="logo">S</div>
    <div>
      <div class="topbar-title">SportScraper</div>
      <div class="topbar-sub">MLB · WNBA · NFL · NBA · NHL · NCAAF · NCAAB</div>
    </div>
    <div class="topbar-right">
      <span class="update-badge" id="updateBadge">Loading…</span>
      <div class="icon-btn" id="dateToggleBtn" onclick="toggleDatePanel()" title="Date range">
        <i class="ti ti-calendar"></i>
      </div>
      <div class="icon-btn" id="colToggleBtn" onclick="toggleColPanel()" title="Show/hide columns">
        <i class="ti ti-columns"></i>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="card">
    <div class="sport-row">
      <button class="sport-btn active" id="btn-mlb"   onclick="setSport('mlb')">MLB</button>
      <button class="sport-btn"        id="btn-wnba"  onclick="setSport('wnba')">WNBA</button>
      <button class="sport-btn"        id="btn-nfl"   onclick="setSport('nfl')">NFL</button>
      <button class="sport-btn"        id="btn-nba"   onclick="setSport('nba')">NBA</button>
      <button class="sport-btn"        id="btn-nhl"   onclick="setSport('nhl')">NHL</button>
      <button class="sport-btn"        id="btn-ncaaf" onclick="setSport('ncaaf')">NCAAF</button>
      <button class="sport-btn"        id="btn-ncaab" onclick="setSport('ncaab')">NCAAB</button>
    </div>

    <div class="card-label" style="margin-top:.75rem">Data source</div>
    <div class="sport-row" id="sourceRow">
      <button class="sport-btn active" id="src-saved"  onclick="setSource('saved')">My Systems</button>
      <button class="sport-btn"        id="src-ai"     onclick="setSource('ai')">AI Trends</button>
      <button class="sport-btn"        id="src-kspro"  onclick="setSource('kspro')">KS Pro</button>
    </div>

    <div class="filter-grid">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="searchInput" placeholder="Team, starter, date…" oninput="applyFilters()" />
      </div>
      <div class="filter-group">
        <label>Pick type</label>
        <select id="pickFilter" onchange="applyFilters()">
          <option value="">All</option>
          <option value="ml">Has ML pick</option>
          <option value="ou">Has OU pick</option>
          <option value="rl">Has RL pick</option>
          <option value="ats">Has ATS pick</option>
          <option value="su">Has SU pick</option>
          <option value="any">Any pick</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Line type</label>
        <select id="lineFilter" onchange="applyFilters()">
          <option value="">All</option>
          <option value="fav">Favorites only</option>
          <option value="dog">Underdogs only</option>
        </select>
      </div>
      <div>
        <button class="clear-btn" onclick="clearFilters()" style="width:100%;padding:.45rem .75rem">Clear filters</button>
      </div>
    </div>

    <div class="card-label">Quick filters</div>
    <div class="chip-row" id="chipRow"></div>

    <!-- Date range panel -->
    <div class="date-panel" id="datePanel">
      <label>From</label>
      <input type="date" id="dateFrom" onchange="applyFilters()" />
      <label>To</label>
      <input type="date" id="dateTo" onchange="applyFilters()" />
      <button class="clear-btn" onclick="clearDates()">Clear dates</button>
    </div>

    <!-- Column visibility panel -->
    <div class="col-panel" id="colPanel">
      <div class="card-label">Visible columns — click to toggle</div>
      <div class="col-panel-inner" id="colToggles"></div>
    </div>
  </div>

  <!-- Results -->
  <div class="card">
    <div id="tableArea">
      <div class="state">
        <i class="ti ti-refresh spinning"></i>
        Loading picks…
      </div>
    </div>
  </div>

  <div class="footer">
    Data refreshed daily at 10 AM via <a href="https://killersports.com" target="_blank" rel="noopener">KillerSports Pro</a>.
    Historical data preserved across updates.
    Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>.
  </div>
</div>

<script>
var allData   = {
    saved:  { mlb: null, wnba: null, nfl: null, nba: null, nhl: null, ncaaf: null, ncaab: null },
    ai:     { mlb: null, wnba: null, nfl: null, nba: null, nhl: null, ncaaf: null, ncaab: null },
    kspro:  { mlb: null, wnba: null, nfl: null, nba: null, nhl: null, ncaaf: null, ncaab: null }
  };
  var source = 'saved';
var sport     = 'mlb';
var sortCol   = -1;
var sortDir   = 'asc';
var hiddenCols = {};   // { mlb: Set, wnba: Set }

var CHIPS = {
  mlb: [
    { label:'All',          pick:'',    line:'' },
    { label:'ML picks',     pick:'ml',  line:'' },
    { label:'OU picks',     pick:'ou',  line:'' },
    { label:'RL picks',     pick:'rl',  line:'' },
    { label:'Any pick',     pick:'any', line:'' },
    { label:'Favorites',    pick:'',    line:'fav' },
    { label:'Underdogs',    pick:'',    line:'dog' },
    { label:'Fav + pick',   pick:'any', line:'fav' },
    { label:'Dog + pick',   pick:'any', line:'dog' },
  ],
  wnba: [
    { label:'All',          pick:'',    line:'' },
    { label:'ATS picks',    pick:'ats', line:'' },
    { label:'OU picks',     pick:'ou',  line:'' },
    { label:'SU picks',     pick:'su',  line:'' },
    { label:'Any pick',     pick:'any', line:'' },
    { label:'Favorites',    pick:'',    line:'fav' },
    { label:'Underdogs',    pick:'',    line:'dog' },
  ],
  nfl: [
    { label:'All',          pick:'',    line:'' },
    { label:'ATS picks',    pick:'ats', line:'' },
    { label:'OU picks',     pick:'ou',  line:'' },
    { label:'ML picks',     pick:'ml',  line:'' },
    { label:'Any pick',     pick:'any', line:'' },
    { label:'Favorites',    pick:'',    line:'fav' },
    { label:'Underdogs',    pick:'',    line:'dog' },
    { label:'Fav + pick',   pick:'any', line:'fav' },
    { label:'Dog + pick',   pick:'any', line:'dog' },
  ],
  nba: [
    { label:'All',          pick:'',    line:'' },
    { label:'ATS picks',    pick:'ats', line:'' },
    { label:'OU picks',     pick:'ou',  line:'' },
    { label:'ML picks',     pick:'ml',  line:'' },
    { label:'Any pick',     pick:'any', line:'' },
    { label:'Favorites',    pick:'',    line:'fav' },
    { label:'Underdogs',    pick:'',    line:'dog' },
  ],
  nhl: [
    { label:'All',          pick:'',    line:'' },
    { label:'ML picks',     pick:'ml',  line:'' },
    { label:'OU picks',     pick:'ou',  line:'' },
    { label:'Any pick',     pick:'any', line:'' },
    { label:'Favorites',    pick:'',    line:'fav' },
    { label:'Underdogs',    pick:'',    line:'dog' },
  ],
  ncaaf: [
    { label:'All',          pick:'',    line:'' },
    { label:'ATS picks',    pick:'ats', line:'' },
    { label:'OU picks',     pick:'ou',  line:'' },
    { label:'ML picks',     pick:'ml',  line:'' },
    { label:'Any pick',     pick:'any', line:'' },
    { label:'Favorites',    pick:'',    line:'fav' },
    { label:'Underdogs',    pick:'',    line:'dog' },
  ],
  ncaab: [
    { label:'All',          pick:'',    line:'' },
    { label:'ATS picks',    pick:'ats', line:'' },
    { label:'OU picks',     pick:'ou',  line:'' },
    { label:'ML picks',     pick:'ml',  line:'' },
    { label:'Any pick',     pick:'any', line:'' },
    { label:'Favorites',    pick:'',    line:'fav' },
    { label:'Underdogs',    pick:'',    line:'dog' },
  ],
};

// ── Boot ──────────────────────────────────────────
(async function init() {
  try {
    var r = await fetch('data.json?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var d = await r.json();
    ['mlb','wnba','nfl','nba','nhl','ncaaf','ncaab'].forEach(function(s) {
      ['saved','ai','kspro'].forEach(function(src) {
        allData[src][s] = (d[src] && d[src][s]) ? d[src][s] : { headers:[], rows:[] };
      });
    });
    var ts = d.updated
      ? 'Updated ' + new Date(d.updated).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})
      : 'Data loaded';
    document.getElementById('updateBadge').textContent = ts;
    initHiddenCols();
    renderChips();
    renderColToggles();
    renderTable();
  } catch(e) {
    document.getElementById('updateBadge').textContent = 'Error';
    document.getElementById('tableArea').innerHTML =
      '<div class="state"><i class="ti ti-alert-circle"></i>Could not load data.json<br><small>' + esc(e.message) + '</small></div>';
  }
})();

// ── Hidden cols init ──────────────────────────────
function initHiddenCols() {
  ['saved','ai','kspro'].forEach(function(src) {
    hiddenCols[src] = {};
    ['mlb','wnba','nfl','nba','nhl','ncaaf','ncaab'].forEach(function(s) {
      hiddenCols[src][s] = new Set();
    });
  });
}

// ── Sport toggle ──────────────────────────────────
function setSport(s) {
  sport = s; sortCol = -1; sortDir = 'asc';
  document.querySelectorAll('.sport-btn').forEach(function(b){ b.classList.remove('active'); });
  var btnEl = document.getElementById('btn-' + s); if(btnEl) btnEl.classList.add('active');
  clearFilters(true);
  renderChips();
  renderColToggles();
  renderTable();
}

// ── Source toggle ────────────────────────────────
  function setSource(s) {
    source = s; sortCol = -1; sortDir = 'asc';
    document.querySelectorAll('#sourceRow .sport-btn').forEach(function(b){ b.classList.remove('active'); });
    var el = document.getElementById('src-' + s); if(el) el.classList.add('active');
    clearFilters(true);
    renderChips();
    renderColToggles();
    renderTable();
  }

  // ── Chips ─────────────────────────────────────────
function renderChips() {
  var row = document.getElementById('chipRow');
  row.innerHTML = (CHIPS[sport] || []).map(function(c, i) {
    return '<button class="chip" onclick="applyChip(' + i + ')">' + c.label + '</button>';
  }).join('');
  // Activate "All" chip by default
  var chips = row.querySelectorAll('.chip');
  if (chips[0]) chips[0].classList.add('active');
}

function applyChip(i) {
  var chip = (CHIPS[sport] || [])[i];
  if (!chip) return;
  document.getElementById('pickFilter').value = chip.pick;
  document.getElementById('lineFilter').value = chip.line;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.chip').forEach(function(c, j){ c.classList.toggle('active', j === i); });
  applyFilters();
}

// ── Date panel ────────────────────────────────────
function toggleDatePanel() {
  var p = document.getElementById('datePanel');
  var b = document.getElementById('dateToggleBtn');
  p.classList.toggle('open');
  b.classList.toggle('active');
}
function clearDates() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value   = '';
  applyFilters();
}

// ── Column panel ──────────────────────────────────
function toggleColPanel() {
  var p = document.getElementById('colPanel');
  var b = document.getElementById('colToggleBtn');
  p.classList.toggle('open');
  b.classList.toggle('active');
}

function renderColToggles() {
  var data = allData[source][sport];
  if (!data || !data.headers || !data.headers.length) return;
  var hidden = hiddenCols[source][sport];
  var container = document.getElementById('colToggles');
  container.innerHTML = data.headers.map(function(h, i) {
    var visible = !hidden.has(i);
    return '<button class="col-toggle ' + (visible ? 'visible' : '') + '" onclick="toggleCol(' + i + ')">' +
      '<i class="ti ti-' + (visible ? 'eye' : 'eye-off') + '"></i>' + esc(h) +
    '</button>';
  }).join('');
}

function toggleCol(i) {
  var hidden = hiddenCols[source][sport];
  if (hidden.has(i)) hidden.delete(i); else hidden.add(i);
  renderColToggles();
  renderTable();
}

// ── Filters ───────────────────────────────────────
function clearFilters(skipRender) {
  document.getElementById('searchInput').value = '';
  document.getElementById('pickFilter').value  = '';
  document.getElementById('lineFilter').value  = '';
  if (!skipRender) {
    document.querySelectorAll('.chip').forEach(function(c, i){ c.classList.toggle('active', i === 0); });
    applyFilters();
  }
}

function applyFilters() { renderTable(); }

function parseDate(str) {
  // Handles "Wednesday, Jun 24, 2026" → Date
  if (!str || str === '@') return null;
  try { return new Date(str); } catch(e){ return null; }
}

function getFiltered() {
  var data = allData[source][sport];
  if (!data || !data.rows) return [];

  var search   = document.getElementById('searchInput').value.toLowerCase().trim();
  var pickF    = document.getElementById('pickFilter').value;
  var lineF    = document.getElementById('lineFilter').value;
  var dateFrom = document.getElementById('dateFrom').value ? new Date(document.getElementById('dateFrom').value) : null;
  var dateTo   = document.getElementById('dateTo').value   ? new Date(document.getElementById('dateTo').value + 'T23:59:59') : null;

  var headers  = data.headers;
  var mlIdx    = headers.findIndex(function(h){ return /^ml$/i.test(h.trim()); });
  var ouIdx    = headers.findIndex(function(h){ return /^ou$/i.test(h.trim()); });
  var rlIdx    = headers.findIndex(function(h){ return /^rl$/i.test(h.trim()); });
  var atsIdx   = headers.findIndex(function(h){ return /^ats$/i.test(h.trim()); });
  var suIdx    = headers.findIndex(function(h){ return /^su$/i.test(h.trim()); });
  var lineIdx  = headers.findIndex(function(h){ return /moneyline|spread|line/i.test(h) && !/total/i.test(h); });
  var dateIdx  = 0;

  // Track current game date for @ rows
  var currentDate = null;

  return data.rows.filter(function(row) {
    var isAt = row[0] === '@';
    if (!isAt) currentDate = parseDate(row[dateIdx]);

    // Date range
    if (dateFrom || dateTo) {
      var d = currentDate;
      if (d) {
        if (dateFrom && d < dateFrom) return false;
        if (dateTo   && d > dateTo)   return false;
      }
    }

    // Text search
    if (search && !row.some(function(c){ return String(c||'').toLowerCase().includes(search); })) return false;

    // Pick filter
    if (pickF) {
      var hasPick = function(idx) { return idx >= 0 && row[idx] && row[idx] !== '-' && row[idx] !== ''; };
      if (pickF === 'any') {
        if (!hasPick(mlIdx) && !hasPick(ouIdx) && !hasPick(rlIdx) && !hasPick(atsIdx) && !hasPick(suIdx)) return false;
      } else if (pickF === 'ml'  && !hasPick(mlIdx))  return false;
      else if   (pickF === 'ou'  && !hasPick(ouIdx))  return false;
      else if   (pickF === 'rl'  && !hasPick(rlIdx))  return false;
      else if   (pickF === 'ats' && !hasPick(atsIdx)) return false;
      else if   (pickF === 'su'  && !hasPick(suIdx))  return false;
    }

    // Line filter
    if (lineF && lineIdx >= 0) {
      var lineVal = String(row[lineIdx] || '');
      var num = parseFloat(lineVal.replace(/[^0-9.\-+]/g, ''));
      if (lineF === 'fav' && !(num < 0)) return false;
      if (lineF === 'dog' && !(num > 0)) return false;
    }

    return true;
  });
}

// ── Render ────────────────────────────────────────
function renderTable() {
  var data = allData[source][sport];
  if (!data || !data.headers || !data.headers.length) {
    document.getElementById('tableArea').innerHTML =
      '<div class="state"><i class="ti ti-mood-empty"></i>No data yet.</div>';
    return;
  }

  var filtered = getFiltered();
  var rows = filtered.slice();
  var hidden = hiddenCols[source][sport];
  var headers = data.headers.filter(function(_, i){ return !hidden.has(i); });
  var colMap  = data.headers.map(function(_, i){ return i; }).filter(function(i){ return !hidden.has(i); });

  // Find pick columns for green highlight
  var pickCols = {};
  rows.forEach(function(row) {
    colMap.forEach(function(ci, vi) {
      var c = row[ci];
      if (c && c !== '-') pickCols[vi] = true;
    });
  });

  if (sortCol >= 0) {
    var sc = colMap[sortCol] !== undefined ? colMap[sortCol] : sortCol;
    rows.sort(function(a, b) {
      var av = a[sc] || '', bv = b[sc] || '';
      var an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return sortDir === 'asc' ? an - bn : bn - an;
      return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
  }

  var thead = '<thead><tr>' + headers.map(function(h, i) {
    var cls = sortCol === i ? sortDir : '';
    return '<th class="' + cls + '" onclick="sortBy(' + i + ')">' + esc(h) + '</th>';
  }).join('') + '</tr></thead>';

  var tbody = '<tbody>' + rows.map(function(row) {
    var isAt   = row[0] === '@';
    return '<tr>' + colMap.map(function(ci, vi) {
      var val = row[ci] != null ? row[ci] : '';
      var cls = '';
      if (ci === 0 && !isAt) cls = 'date-cell';
      else if (ci === 0 && isAt) cls = 'at-cell';
      else if (val && val !== '-' && pickCols[vi]) cls = 'has-pick';
      return '<td' + (cls ? ' class="' + cls + '"' : '') + '>' + esc(val) + '</td>';
    }).join('') + '</tr>';
  }).join('') + '</tbody>';

  var total = filtered.length;
  document.getElementById('tableArea').innerHTML =
    '<div class="results-header">' +
      '<span class="row-count">' + total + ' row' + (total !== 1 ? 's' : '') + '</span>' +
      '<button class="dl-btn" onclick="downloadCSV()"><i class="ti ti-download"></i> Download CSV</button>' +
    '</div>' +
    (rows.length ? '<div class="table-wrap"><table>' + thead + tbody + '</table></div>'
                 : '<div class="state"><i class="ti ti-mood-empty"></i>No rows match.</div>');
}

function sortBy(col) {
  sortDir = sortCol === col ? (sortDir === 'asc' ? 'desc' : 'asc') : 'asc';
  sortCol = col;
  renderTable();
}

// ── Download CSV ──────────────────────────────────
function downloadCSV() {
  var data = allData[source][sport];
  if (!data) return;
  var hidden  = hiddenCols[sport];
  var colMap  = data.headers.map(function(_, i){ return i; }).filter(function(i){ return !hidden.has(i); });
  var headers = colMap.map(function(i){ return data.headers[i]; });
  var rows    = getFiltered();
  var lines   = [headers.map(csvCell).join(',')];
  rows.forEach(function(row) {
    lines.push(colMap.map(function(i){ return csvCell(row[i] != null ? row[i] : ''); }).join(','));
  });
  var blob = new Blob([lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = sport + '_picks_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
}

function csvCell(v) {
  var s = String(v);
  return (s.includes(',') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
