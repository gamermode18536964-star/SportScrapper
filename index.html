<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDQL Data — MLB &amp; WNBA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:  #0d1117;
      --bg-card:  #161b22;
      --bg-input: #0d1117;
      --bg-row:   #1c2128;
      --border:   #30363d;
      --border-s: #21262d;
      --hi:       #e6edf3;
      --lo:       #8b949e;
      --green:    #3fb950;
      --green-bg: #1a2e20;
      --green-bd: #238636;
      --blue:     #79c0ff;
      --blue-bg:  #132030;
      --blue-bd:  #388bfd;
      --amber:    #e3b341;
      --amber-bg: #2d2007;
      --red:      #f85149;
      --red-bg:   #2d1117;
    }

    body {
      background: var(--bg-page);
      color: var(--hi);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .shell { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Top bar ─── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      width: 38px; height: 38px;
      background: #1a7f4b;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0;
    }
    .topbar-title { font-size: 17px; font-weight: 500; }
    .topbar-sub   { font-size: 13px; color: var(--lo); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .update-badge {
      font-size: 11px; color: var(--lo);
      background: var(--bg-row);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
    }

    /* ── Cards ─── */
    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--lo);
      font-weight: 500;
      margin-bottom: .5rem;
    }

    /* ── Sport tabs ─── */
    .sport-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .sport-btn {
      padding: 5px 16px;
      border-radius: 5px;
      border: 0.5px solid var(--border);
      background: var(--bg-input);
      color: var(--lo);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .sport-btn:hover  { border-color: var(--green-bd); color: var(--green); }
    .sport-btn.active { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }

    /* ── Search & controls ─── */
    .controls-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-wrap i {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--lo);
      font-size: 16px;
      pointer-events: none;
    }
    input[type="text"] {
      width: 100%;
      background: var(--bg-input);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      color: var(--hi);
      font-size: 13px;
      padding: .5rem .75rem .5rem 2.25rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--blue-bd); }
    input[type="text"]::placeholder { color: var(--lo); }

    select {
      background: var(--bg-input);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      color: var(--hi);
      font-size: 13px;
      padding: .5rem .75rem;
      outline: none;
      cursor: pointer;
      font-family: inherit;
    }
    select:focus { border-color: var(--blue-bd); }

    /* ── Results ─── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row-count { font-size: 13px; color: var(--lo); }
    .dl-btn {
      padding: 5px 14px;
      background: var(--green-bg);
      border: 0.5px solid var(--green-bd);
      border-radius: 5px;
      color: var(--green);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      transition: all .15s;
    }
    .dl-btn:hover { background: #223e2b; }

    .table-wrap {
      overflow-x: auto;
      border: 0.5px solid var(--border);
      border-radius: 6px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: var(--bg-row);
      color: var(--lo);
      font-weight: 500;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 0.5px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color .15s;
    }
    th:hover { color: var(--hi); }
    th .sort-icon { margin-left: 4px; opacity: .4; font-size: 11px; }
    th.asc .sort-icon::after  { content: '↑'; opacity: 1; }
    th.desc .sort-icon::after { content: '↓'; opacity: 1; }
    th .sort-icon::after      { content: '↕'; }
    td {
      padding: 7px 12px;
      border-bottom: 0.5px solid var(--border-s);
      color: var(--hi);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg-row); }

    /* ── Loading / error states ─── */
    .state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--lo);
      font-size: 13px;
    }
    .state i { font-size: 32px; display: block; margin-bottom: .75rem; opacity: .4; }
    .state.err { color: var(--red); }
    .state.err i { opacity: .6; }

    /* ── Footer ─── */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--lo);
      margin-top: 2rem;
      border-top: 0.5px solid var(--border);
      padding-top: 1.25rem;
    }
    .footer a { color: var(--blue); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 1s linear infinite; }

    @media (max-width: 520px) {
      .shell { padding: 1.25rem 1rem 3rem; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Top bar ─── -->
  <div class="topbar">
    <div class="logo" aria-hidden="true">S</div>
    <div>
      <div class="topbar-title">SDQL Data</div>
      <div class="topbar-sub">Daily MLB &amp; WNBA stats</div>
    </div>
    <div class="topbar-right">
      <span class="update-badge" id="updateBadge">Loading…</span>
    </div>
  </div>

  <!-- ── Controls card ─── -->
  <div class="card">
    <div class="card-label">Sport</div>
    <div class="sport-row">
      <button class="sport-btn active" id="btn-mlb"  onclick="setSport('mlb')">MLB</button>
      <button class="sport-btn"        id="btn-wnba" onclick="setSport('wnba')">WNBA</button>
    </div>

    <div class="controls-row">
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" placeholder="Filter by team, date, matchup…" oninput="applyFilters()" />
      </div>
      <select id="seasonFilter" onchange="applyFilters()">
        <option value="">All seasons</option>
      </select>
      <select id="ouFilter" onchange="applyFilters()">
        <option value="">Over / Under</option>
        <option value="o">Overs only</option>
        <option value="u">Unders only</option>
      </select>
    </div>
  </div>

  <!-- ── Results card ─── -->
  <div class="card" id="resultsCard">
    <div id="tableArea">
      <div class="state">
        <i class="ti ti-refresh spinning" aria-hidden="true"></i>
        Loading today's data…
      </div>
    </div>
  </div>

  <!-- ── Footer ─── -->
  <div class="footer">
    Data refreshed daily at 10 AM via <a href="https://sportsdatabase.com" target="_blank" rel="noopener">Sports Database SDQL API</a>.
    Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>.
  </div>

</div><!-- /shell -->

<script>
  var allData   = { mlb: null, wnba: null };
  var sport     = 'mlb';
  var sortCol   = -1;
  var sortDir   = 'asc';
  var filtered  = [];   // current filtered rows

  // ── Boot ─────────────────────────────────────────
  (async function init() {
    try {
      var r = await fetch('data.json?_=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var d = await r.json();

      allData.mlb  = d.mlb  || { headers: [], rows: [] };
      allData.wnba = d.wnba || { headers: [], rows: [] };

      var ts = d.updated
        ? 'Updated ' + new Date(d.updated).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })
        : 'Data loaded';
      document.getElementById('updateBadge').textContent = ts;

      buildSeasonFilter();
      renderTable();
    } catch (e) {
      document.getElementById('updateBadge').textContent = 'Error loading data';
      document.getElementById('tableArea').innerHTML =
        '<div class="state err"><i class="ti ti-alert-circle" aria-hidden="true"></i>' +
        'Could not load data.json — make sure the GitHub Action has run at least once.<br>' +
        '<small style="margin-top:.5rem;display:block">' + esc(e.message) + '</small></div>';
    }
  })();

  // ── Sport toggle ─────────────────────────────────
  function setSport(s) {
    sport = s;
    sortCol = -1; sortDir = 'asc';
    document.querySelectorAll('.sport-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-' + s).classList.add('active');
    document.getElementById('searchInput').value = '';
    document.getElementById('ouFilter').value = '';
    buildSeasonFilter();
    renderTable();
  }

  // ── Season filter ─────────────────────────────────
  function buildSeasonFilter() {
    var data = allData[sport];
    var sel  = document.getElementById('seasonFilter');
    var prev = sel.value;
    sel.innerHTML = '<option value="">All seasons</option>';
    if (!data || !data.headers) return;
    var si = data.headers.indexOf('season');
    if (si < 0) return;
    var seasons = [...new Set(data.rows.map(function(r){ return r[si]; }))].filter(Boolean).sort().reverse();
    seasons.forEach(function(s){
      var o = document.createElement('option');
      o.value = o.textContent = s;
      sel.appendChild(o);
    });
    if (seasons.includes(Number(prev)) || seasons.includes(prev)) sel.value = prev;
  }

  // ── Filter & sort ─────────────────────────────────
  function applyFilters() { renderTable(); }

  function getFiltered() {
    var data   = allData[sport];
    if (!data || !data.rows) return [];
    var search = document.getElementById('searchInput').value.toLowerCase().trim();
    var season = document.getElementById('seasonFilter').value;
    var ou     = document.getElementById('ouFilter').value;

    var si  = data.headers.indexOf('season');
    var oui = data.headers.indexOf('ou');

    return data.rows.filter(function(row) {
      if (season && String(row[si]) !== String(season)) return false;
      if (ou     && String(row[oui]).toLowerCase() !== ou)    return false;
      if (search) {
        var line = row.map(function(c){ return String(c ?? '').toLowerCase(); }).join(' ');
        if (!line.includes(search)) return false;
      }
      return true;
    });
  }

  // ── Render ────────────────────────────────────────
  function renderTable() {
    var data = allData[sport];
    if (!data) return;
    filtered = getFiltered();

    var rows = filtered.slice();
    if (sortCol >= 0) {
      rows.sort(function(a, b) {
        var av = a[sortCol], bv = b[sortCol];
        var an = parseFloat(av), bn = parseFloat(bv);
        if (!isNaN(an) && !isNaN(bn)) return sortDir === 'asc' ? an - bn : bn - an;
        return sortDir === 'asc'
          ? String(av ?? '').localeCompare(String(bv ?? ''))
          : String(bv ?? '').localeCompare(String(av ?? ''));
      });
    }

    var preview = rows.slice(0, 200);
    var totalLabel = rows.length.toLocaleString() + ' row' + (rows.length !== 1 ? 's' : '');
    if (rows.length > 200) totalLabel += ' (showing 200)';

    var thead = '<thead><tr>' + data.headers.map(function(h, i) {
      var cls = sortCol === i ? sortDir : '';
      return '<th class="' + cls + '" onclick="sortBy(' + i + ')">' + esc(h) + '<span class="sort-icon"></span></th>';
    }).join('') + '</tr></thead>';

    var tbody = preview.length
      ? '<tbody>' + preview.map(function(row) {
          return '<tr>' + row.map(function(c){ return '<td>' + esc(c != null ? c : ''); + '</td>'; }).join('') + '</tr>';
        }).join('') + '</tbody>'
      : '';

    var empty = !preview.length
      ? '<div class="state"><i class="ti ti-mood-empty" aria-hidden="true"></i>No rows match your filters.</div>'
      : '';

    document.getElementById('tableArea').innerHTML =
      '<div class="results-header">' +
        '<span class="row-count">' + totalLabel + '</span>' +
        '<button class="dl-btn" onclick="downloadCSV()">' +
          '<i class="ti ti-download" aria-hidden="true"></i> Download CSV' +
        '</button>' +
      '</div>' +
      (preview.length
        ? '<div class="table-wrap"><table aria-label="Sports data">' + thead + tbody + '</table></div>'
        : empty);
  }

  // ── Sort ──────────────────────────────────────────
  function sortBy(col) {
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    renderTable();
  }

  // ── Download CSV ──────────────────────────────────
  function downloadCSV() {
    var data = allData[sport];
    if (!data) return;
    var rows = filtered.length ? filtered : data.rows;
    var lines = [data.headers.map(csvCell).join(',')];
    rows.forEach(function(row) {
      lines.push(row.map(function(c){ return csvCell(c != null ? c : ''); }).join(','));
    });
    var blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = sport + '_sdql_' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  // ── Helpers ───────────────────────────────────────
  function csvCell(v) {
    var s = String(v);
    return (s.includes(',') || s.includes('"') || s.includes('\n'))
      ? '"' + s.replace(/"/g, '""') + '"' : s;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
