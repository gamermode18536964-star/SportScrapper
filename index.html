<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDQL CSV Tool — MLB &amp; WNBA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #0d1117;
      --bg-card:    #161b22;
      --bg-input:   #0d1117;
      --bg-row:     #1c2128;
      --border:     #30363d;
      --border-sub: #21262d;
      --text-hi:    #e6edf3;
      --text-lo:    #8b949e;
      --green:      #3fb950;
      --green-bg:   #1a2e20;
      --green-bd:   #238636;
      --blue:       #79c0ff;
      --blue-bg:    #132030;
      --blue-bd:    #388bfd;
      --red:        #f85149;
      --red-bg:     #2d1117;
    }

    body {
      background: var(--bg-page);
      color: var(--text-hi);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────── */
    .shell {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Top bar ─────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      width: 38px;
      height: 38px;
      background: #1a7f4b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 17px; font-weight: 500; }
    .topbar-sub   { font-size: 13px; color: var(--text-lo); }
    .topbar-badge {
      margin-left: auto;
      background: var(--green-bg);
      color: var(--green);
      border: 0.5px solid var(--green-bd);
      border-radius: 4px;
      font-size: 11px;
      padding: 2px 10px;
      white-space: nowrap;
    }

    /* ── Cards ───────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-lo);
      font-weight: 500;
      margin-bottom: .5rem;
    }

    /* ── Sport toggle ────────────────────────────── */
    .sport-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .sport-btn {
      padding: 5px 16px;
      border-radius: 5px;
      border: 0.5px solid var(--border);
      background: var(--bg-input);
      color: var(--text-lo);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .sport-btn:hover  { border-color: var(--green-bd); color: var(--green); }
    .sport-btn.active { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }

    /* ── Query textarea ──────────────────────────── */
    textarea {
      width: 100%;
      background: var(--bg-input);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      color: var(--text-hi);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.65;
      padding: .75rem 1rem;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--blue-bd); }

    /* ── Column quick-insert tags ────────────────── */
    .cols-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: .75rem; }
    .col-tag {
      padding: 3px 10px;
      background: var(--bg-row);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-lo);
      cursor: pointer;
      user-select: none;
      transition: all .15s;
    }
    .col-tag:hover  { border-color: var(--blue-bd); color: var(--blue); }
    .col-tag.active { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }

    /* ── Example queries ─────────────────────────── */
    .examples-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: .75rem; }
    .ex-btn {
      padding: 4px 10px;
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 4px;
      color: var(--text-lo);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .ex-btn:hover { border-color: var(--green-bd); color: var(--green); background: var(--green-bg); }

    /* ── Run button ──────────────────────────────── */
    .run-btn {
      width: 100%;
      padding: .7rem;
      background: var(--green-bd);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }
    .run-btn:hover    { background: #2ea043; }
    .run-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    /* ── Status messages ─────────────────────────── */
    .status {
      font-size: 13px;
      padding: .5rem .75rem;
      border-radius: 5px;
      margin-top: .75rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status.err { background: var(--red-bg);   border: 0.5px solid var(--red);       color: var(--red);   }
    .status.ok  { background: var(--green-bg); border: 0.5px solid var(--green-bd);  color: var(--green); }

    /* ── Results ─────────────────────────────────── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .row-count { font-size: 13px; color: var(--text-lo); }
    .dl-btn {
      padding: 5px 14px;
      background: var(--green-bg);
      border: 0.5px solid var(--green-bd);
      border-radius: 5px;
      color: var(--green);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      transition: all .15s;
    }
    .dl-btn:hover { background: #223e2b; }

    .table-wrap {
      overflow-x: auto;
      border: 0.5px solid var(--border);
      border-radius: 6px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: var(--bg-row);
      color: var(--text-lo);
      font-weight: 500;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 0.5px solid var(--border);
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    td {
      padding: 7px 12px;
      border-bottom: 0.5px solid var(--border-sub);
      color: var(--text-hi);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg-row); }

    /* ── Footer ──────────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-lo);
      margin-top: 2rem;
      border-top: 0.5px solid var(--border);
      padding-top: 1.25rem;
    }
    .footer a { color: var(--blue); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      .topbar-badge { display: none; }
      .shell { padding: 1.25rem 1rem 3rem; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Top bar ─────────────────────────────────── -->
  <div class="topbar">
    <div class="logo" aria-hidden="true">S</div>
    <div>
      <div class="topbar-title">SDQL CSV Tool</div>
      <div class="topbar-sub">Query, preview, and download sports data</div>
    </div>
    <div class="topbar-badge">MLB &amp; WNBA</div>
  </div>

  <!-- ── Query builder card ─────────────────────── -->
  <div class="card">
    <div class="card-label">Sport</div>
    <div class="sport-row">
      <button class="sport-btn active" id="btn-mlb"  onclick="setSport('mlb')">MLB</button>
      <button class="sport-btn"        id="btn-wnba" onclick="setSport('wnba')">WNBA</button>
    </div>

    <div class="card-label">SDQL Query</div>
    <textarea id="query" spellcheck="false" placeholder="e.g. team and date and season and total and ou"></textarea>

    <div style="margin-top:1rem">
      <div class="card-label">Quick columns — click to append</div>
      <div class="cols-row" id="cols"></div>
    </div>

    <div style="margin-top:1rem">
      <div class="card-label">Example queries</div>
      <div class="examples-row" id="examples"></div>
    </div>

    <button class="run-btn" id="runBtn" onclick="runQuery()">
      <i class="ti ti-player-play" aria-hidden="true"></i>
      Run query &amp; preview
    </button>
    <div id="status"></div>
  </div>

  <!-- ── Results card (hidden until data loads) ─── -->
  <div class="card" id="resultsCard" style="display:none">
    <div class="results-header">
      <span class="row-count" id="rowCount"></span>
      <button class="dl-btn" onclick="downloadCSV()" title="Download full results as CSV">
        <i class="ti ti-download" aria-hidden="true"></i> Download CSV
      </button>
    </div>
    <div class="table-wrap">
      <table id="resultTable" aria-label="Query results preview"></table>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────── -->
  <div class="footer">
    Powered by the <a href="https://sportsdatabase.com" target="_blank" rel="noopener">Sports Database SDQL API</a>.
    Data updates daily. Preview shows first 25 rows; download includes all.
  </div>

</div><!-- /shell -->

<script>
  // ── Config ──────────────────────────────────────
  // Replace with your actual SDQL API key.
  var API_KEY = 'YOUR_API_KEY_HERE';

  var SPORTS = {
    mlb: {
      endpoint: 'https://s3.sportsdatabase.com/mlb/query',
      cols: ['team','date','season','site','o:team','total','ou','line','runs','o:runs','innings','starter','o:starter','era','o:era'],
      examples: [
        { label: 'Today\'s games', q: 'team and date and o:team and site and line and total and ou' },
        { label: 'Overs this season', q: 'team and date and o:team and total and ou and runs and o:runs where season = 2025 and ou = "o"' },
        { label: 'Home team wins', q: 'team and date and season and runs and o:runs and line where site = "home" and runs > o:runs' },
      ]
    },
    wnba: {
      endpoint: 'https://s3.sportsdatabase.com/wnba/query',
      cols: ['team','date','season','site','o:team','total','ou','line','points','o:points','overtime'],
      examples: [
        { label: 'Today\'s games', q: 'team and date and o:team and site and line and total and ou' },
        { label: 'High-scoring games', q: 'team and date and o:team and total and ou and points and o:points where season = 2025 and points + o:points > 170' },
        { label: 'Road wins', q: 'team and date and season and points and o:points and line where site = "away" and points > o:points' },
      ]
    }
  };

  var currentSport = 'mlb';
  var csvData = null;   // { headers, rows }

  // ── Sport toggle ────────────────────────────────
  function setSport(s) {
    currentSport = s;
    document.querySelectorAll('.sport-btn').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('btn-' + s).classList.add('active');
    renderCols();
    renderExamples();
  }

  // ── Column chips ────────────────────────────────
  function renderCols() {
    var container = document.getElementById('cols');
    container.innerHTML = '';
    SPORTS[currentSport].cols.forEach(function(col) {
      var el = document.createElement('span');
      el.className = 'col-tag';
      el.textContent = col;
      el.onclick = function() { insertCol(col, el); };
      container.appendChild(el);
    });
  }

  function insertCol(col, el) {
    var ta = document.getElementById('query');
    var v = ta.value.trim();
    if (v && !v.endsWith(' ') && !v.endsWith(',')) v += ' and ';
    ta.value = v + col;
    el.classList.toggle('active');
    ta.focus();
  }

  // ── Example queries ─────────────────────────────
  function renderExamples() {
    var container = document.getElementById('examples');
    container.innerHTML = '';
    SPORTS[currentSport].examples.forEach(function(ex) {
      var btn = document.createElement('button');
      btn.className = 'ex-btn';
      btn.textContent = ex.label;
      btn.onclick = function() {
        document.getElementById('query').value = ex.q;
        document.getElementById('query').focus();
      };
      container.appendChild(btn);
    });
  }

  // ── Run query ───────────────────────────────────
  async function runQuery() {
    var q = document.getElementById('query').value.trim();
    if (!q) { showStatus('<i class="ti ti-alert-circle" aria-hidden="true"></i> Please enter an SDQL query.', 'err'); return; }

    var btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-refresh" aria-hidden="true" style="animation:spin 1s linear infinite"></i> Fetching…';
    document.getElementById('status').innerHTML = '';
    document.getElementById('resultsCard').style.display = 'none';
    csvData = null;

    try {
      var sport = SPORTS[currentSport];
      var url = sport.endpoint + '?sdql=' + encodeURIComponent(q) + '&output=json&api_key=' + API_KEY;
      var r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status + ' — check your API key or query syntax.');
      var d = await r.json();
      if (d.errors && d.errors.length) throw new Error(d.errors.join('; '));
      if (!d.headers || !d.rows || !d.rows.length) {
        showStatus('<i class="ti ti-mood-empty" aria-hidden="true"></i> No results returned. Try adjusting your query.', 'err');
        return;
      }
      processResults(d);
    } catch (e) {
      showStatus('<i class="ti ti-alert-circle" aria-hidden="true"></i> ' + e.message, 'err');
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> Run query &amp; preview';
  }

  // ── Render results ──────────────────────────────
  function processResults(d) {
    csvData = { headers: d.headers, rows: d.rows };

    var preview = d.rows.slice(0, 25);
    var thead = '<thead><tr>' + d.headers.map(function(h){ return '<th>' + esc(h) + '</th>'; }).join('') + '</tr></thead>';
    var tbody = '<tbody>' + preview.map(function(row){
      return '<tr>' + row.map(function(c){ return '<td>' + esc(c != null ? c : ''); + '</td>'; }).join('') + '</tr>';
    }).join('') + '</tbody>';

    document.getElementById('resultTable').innerHTML = thead + tbody;
    document.getElementById('rowCount').textContent =
      d.rows.length.toLocaleString() + ' row' + (d.rows.length !== 1 ? 's' : '') + ' returned (previewing first 25)';
    document.getElementById('resultsCard').style.display = 'block';
    showStatus('<i class="ti ti-check" aria-hidden="true"></i> Query successful — ' + d.rows.length.toLocaleString() + ' rows ready for download.', 'ok');
  }

  // ── Download CSV ────────────────────────────────
  function downloadCSV() {
    if (!csvData) return;
    var lines = [csvData.headers.map(csvCell).join(',')];
    csvData.rows.forEach(function(row) {
      lines.push(row.map(function(c){ return csvCell(c != null ? c : ''); }).join(','));
    });
    var blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    var d = new Date().toISOString().slice(0, 10);
    a.download = currentSport + '_sdql_' + d + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  // ── Helpers ─────────────────────────────────────
  function csvCell(v) {
    var s = String(v);
    return (s.includes(',') || s.includes('"') || s.includes('\n'))
      ? '"' + s.replace(/"/g, '""') + '"'
      : s;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showStatus(html, type) {
    document.getElementById('status').innerHTML = '<div class="status ' + type + '">' + html + '</div>';
  }

  // ── Init ─────────────────────────────────────────
  renderCols();
  renderExamples();

  // Spin animation for loading state
  var style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);
</script>
</body>
</html>
