name: Fetch SDQL Data

on:
  schedule:
    # Runs at 10:00 AM UTC daily (adjust timezone offset if needed)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch MLB data
        run: |
          curl -s "https://s3.sportsdatabase.com/mlb/query?sdql=team%20and%20date%20and%20o:team%20and%20site%20and%20line%20and%20total%20and%20ou%20and%20runs%20and%20o:runs%20and%20season&output=json&api_key=${{ secrets.SDQL_API_KEY }}" \
            -o mlb_raw.json

      - name: Fetch WNBA data
        run: |
          curl -s "https://s3.sportsdatabase.com/wnba/query?sdql=team%20and%20date%20and%20o:team%20and%20site%20and%20line%20and%20total%20and%20ou%20and%20points%20and%20o:points%20and%20season&output=json&api_key=${{ secrets.SDQL_API_KEY }}" \
            -o wnba_raw.json

      - name: Merge into data.json
        run: |
          python3 - <<'EOF'
          import json, datetime

          def load(path):
              with open(path) as f:
                  return json.load(f)

          mlb  = load('mlb_raw.json')
          wnba = load('wnba_raw.json')

          out = {
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "mlb":  {"headers": mlb.get("headers",  []), "rows": mlb.get("rows",  [])},
              "wnba": {"headers": wnba.get("headers", []), "rows": wnba.get("rows", [])}
          }

          with open('data.json', 'w') as f:
              json.dump(out, f)

          print(f"MLB rows:  {len(out['mlb']['rows'])}")
          print(f"WNBA rows: {len(out['wnba']['rows'])}")
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
          git push

      - name: Clean up temp files
        run: rm -f mlb_raw.json wnba_raw.json
