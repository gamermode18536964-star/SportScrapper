name: Fetch KillerSports Data

on:
  schedule:
    - cron: '0 15 * * *'   # 10 AM Eastern (UTC-5 standard / UTC-4 daylight)
  workflow_dispatch:        # Manual trigger anytime from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install playwright beautifulsoup4 --break-system-packages
          playwright install chromium --with-deps

      - name: Scrape KillerSports Active Schedule
        env:
          KS_USERNAME: ${{ secrets.KS_USERNAME }}
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import json, datetime, os, sys, time
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup

          username = os.environ["KS_USERNAME"]
          password = os.environ["KS_PASSWORD"]

          def scrape_schedule(page, sport, url):
              """Navigate to a sport's active schedule and return parsed table data."""
              print(f"Fetching {sport} schedule from {url}")
              page.goto(url, wait_until="networkidle", timeout=60000)
              time.sleep(3)

              # Take a debug screenshot
              page.screenshot(path=f"{sport}_schedule.png")

              html = page.content()
              soup = BeautifulSoup(html, "html.parser")

              # Find the main data table — KillerSports uses various table classes
              table = (
                  soup.find("table", {"class": lambda c: c and "schedule" in c.lower()})
                  or soup.find("table", {"id": lambda i: i and "schedule" in i.lower()})
                  or soup.find("table")   # fallback: first table on page
              )

              if not table:
                  print(f"WARNING: No table found on {sport} page", file=sys.stderr)
                  return {"headers": [], "rows": []}

              # Parse headers
              headers = []
              header_row = table.find("thead")
              if header_row:
                  headers = [th.get_text(strip=True) for th in header_row.find_all(["th", "td"])]
              else:
                  first_row = table.find("tr")
                  if first_row:
                      headers = [td.get_text(strip=True) for td in first_row.find_all(["th", "td"])]

              # Parse rows
              rows = []
              tbody = table.find("tbody") or table
              for tr in tbody.find_all("tr"):
                  cells = [td.get_text(strip=True) for td in tr.find_all(["td", "th"])]
                  if cells and any(c.strip() for c in cells):
                      rows.append(cells)

              print(f"{sport}: {len(rows)} rows, {len(headers)} columns")
              return {"headers": headers, "rows": rows}

          with sync_playwright() as pw:
              browser = pw.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36"
              )
              page = context.new_page()

              # ── Log in ──────────────────────────────────────
              print("Logging in to KillerSports...")
              page.goto("https://killersports.com/mlb/howto-view", wait_until="networkidle", timeout=60000)
              time.sleep(2)

              # Click login button to open modal
              try:
                  page.click("a[href*='login'], button:has-text('Log In'), .login-btn", timeout=5000)
                  time.sleep(1)
              except:
                  print("Login button not found by selector, trying alternate...")

              # Fill credentials
              try:
                  page.fill("input[name='username'], input[type='email'], #username", username)
                  page.fill("input[name='password'], input[type='password'], #password", password)
                  page.click("button[type='submit']:has-text('Log In'), input[type='submit'], .login-submit")
                  time.sleep(3)
                  page.screenshot(path="after_login.png")
                  print("Login submitted")
              except Exception as e:
                  print(f"Login error: {e}", file=sys.stderr)
                  page.screenshot(path="login_error.png")

              # ── Scrape MLB active schedule ───────────────────
              mlb_data  = scrape_schedule(page, "mlb",  "https://killersports.com/mlb/howto-view")

              # ── Scrape WNBA active schedule ──────────────────
              wnba_data = scrape_schedule(page, "wnba", "https://killersports.com/wnba/howto-view")

              browser.close()

          # ── Write data.json ──────────────────────────────────
          out = {
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "mlb":  mlb_data,
              "wnba": wnba_data
          }

          with open("data.json", "w") as f:
              json.dump(out, f, indent=2)

          print(f"\nDone — MLB: {len(mlb_data['rows'])} rows, WNBA: {len(wnba_data['rows'])} rows")
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: KillerSports refresh $(date -u +%Y-%m-%d)"
          git push

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
