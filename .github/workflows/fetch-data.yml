name: Fetch KillerSports Data

on:
  schedule:
    - cron: '0 15 * * *'   # 10 AM Eastern
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install playwright beautifulsoup4 --break-system-packages
          playwright install chromium --with-deps

      - name: Scrape KillerSports & merge history
        env:
          KS_USERNAME: ${{ secrets.KS_USERNAME }}
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import json, datetime, os, sys, time
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup

          username = os.environ["KS_USERNAME"]
          password = os.environ["KS_PASSWORD"]

          SPORTS = {
              "mlb":   "https://killersports.com/saved-trend-alerts?filter=MLB",
              "wnba":  "https://killersports.com/saved-trend-alerts?filter=WNBA",
              "nfl":   "https://killersports.com/saved-trend-alerts?filter=NFL",
              "nba":   "https://killersports.com/saved-trend-alerts?filter=NBA",
              "nhl":   "https://killersports.com/saved-trend-alerts?filter=NHL",
              "ncaaf": "https://killersports.com/saved-trend-alerts?filter=NCAAFB",
              "ncaab": "https://killersports.com/saved-trend-alerts?filter=NCAABB",
          }

          def scrape_schedule(page, sport, url):
              print(f"\nFetching {sport}: {url}")
              page.goto(url, wait_until="networkidle", timeout=60000)
              time.sleep(4)
              page.screenshot(path=f"{sport}_schedule.png")

              html = page.content()

              # Check for no trends message
              if "No Trends to Show" in html:
                  print(f"  {sport}: No Trends to Show — skipping")
                  return None

              soup = BeautifulSoup(html, "html.parser")
              tables = soup.find_all("table")
              print(f"  Found {len(tables)} table(s)")

              if not tables:
                  title = soup.find("title")
                  print(f"  Page title: {title.text if title else 'unknown'}")
                  return None

              table = max(tables, key=lambda t: len(t.find_all("tr")))

              headers = []
              thead = table.find("thead")
              if thead:
                  headers = [th.get_text(strip=True) for th in thead.find_all(["th", "td"])]
              if not headers:
                  first_row = table.find("tr")
                  if first_row:
                      headers = [td.get_text(strip=True) for td in first_row.find_all(["th", "td"])]

              rows = []
              tbody = table.find("tbody") or table
              for tr in tbody.find_all("tr"):
                  cells = [td.get_text(strip=True) for td in tr.find_all(["td", "th"])]
                  if cells and any(c.strip() for c in cells):
                      rows.append(cells)

              print(f"  Parsed: {len(headers)} headers, {len(rows)} rows")
              return {"headers": headers, "rows": rows}

          def merge(existing, fresh):
              if fresh is None:
                  print("  No fresh data — keeping existing")
                  return existing
              if not fresh["rows"]:
                  return existing
              if not existing["rows"]:
                  return fresh

              today_labels = set()
              for row in fresh["rows"]:
                  if row[0] and row[0] != "@":
                      today_labels.add(row[0])

              kept = []
              skip = False
              for row in existing["rows"]:
                  if row[0] and row[0] != "@":
                      skip = row[0] in today_labels
                  if not skip:
                      kept.append(row)

              return {
                  "headers": fresh["headers"],
                  "rows": kept + fresh["rows"]
              }

          # Load existing data.json
          existing = {}
          try:
              with open("data.json") as f:
                  existing = json.load(f)
          except:
              pass

          with sync_playwright() as pw:
              browser = pw.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
              )
              page = context.new_page()

              print("Loading KillerSports...")
              page.goto("https://killersports.com", wait_until="networkidle", timeout=60000)
              time.sleep(2)

              print("Opening login modal...")
              page.evaluate("$('.modal-login').fadeIn()")
              time.sleep(1)

              print("Filling credentials...")
              page.fill(".modal-login input[type='email'], .modal-login input[name='email'], .modal-login input[name='username'], .modal-login input[type='text']", username)
              page.fill(".modal-login input[type='password']", password)

              try:
                  page.evaluate("document.getElementById('__abconsent-cmp')?.remove()")
              except:
                  pass
              time.sleep(0.5)

              print("Submitting login...")
              page.click(".modal-login .button-primary")
              time.sleep(4)
              page.screenshot(path="after_login.png")

              if "My Account" in page.content():
                  print("✓ Login successful!")
              else:
                  print("✗ Login may have failed")
                  sys.exit(1)

              fresh_data = {}
              for key, url in SPORTS.items():
                  fresh_data[key] = scrape_schedule(page, key, url)

              browser.close()

          # Merge all sports with history
          out = {"updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")}
          for key in SPORTS:
              old = existing.get(key, {"headers": [], "rows": []})
              out[key] = merge(old, fresh_data.get(key))
              print(f"{key}: {len(out[key]['rows'])} total rows")

          with open("data.json", "w") as f:
              json.dump(out, f, indent=2)

          print("\ndata.json written successfully")
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: KillerSports refresh $(date -u +%Y-%m-%d)"
          git push

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3

      - name: Trigger GitHub Pages deployment
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
          echo "Pages build triggered"
