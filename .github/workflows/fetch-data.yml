name: Fetch KillerSports Data

on:
  schedule:
    - cron: '0 15 * * *'   # 10 AM Eastern (UTC-5 standard / UTC-4 daylight)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install playwright beautifulsoup4 --break-system-packages
          playwright install chromium --with-deps

      - name: Scrape KillerSports Active Schedule
        env:
          KS_USERNAME: ${{ secrets.KS_USERNAME }}
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import json, datetime, os, sys, time
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup

          username = os.environ["KS_USERNAME"]
          password = os.environ["KS_PASSWORD"]

          def scrape_schedule(page, sport, url):
              print(f"\nFetching {sport} schedule: {url}")
              page.goto(url, wait_until="networkidle", timeout=60000)
              time.sleep(4)
              page.screenshot(path=f"{sport}_schedule.png")

              html = page.content()
              soup = BeautifulSoup(html, "html.parser")

              # Print all tables found for debugging
              tables = soup.find_all("table")
              print(f"  Found {len(tables)} table(s) on page")
              for i, t in enumerate(tables):
                  rows = t.find_all("tr")
                  cls = t.get("class", "")
                  tid = t.get("id", "")
                  print(f"  Table {i}: id='{tid}' class='{cls}' rows={len(rows)}")

              if not tables:
                  print(f"  WARNING: No tables found", file=sys.stderr)
                  # Print page title so we know what page we're on
                  title = soup.find("title")
                  print(f"  Page title: {title.text if title else 'unknown'}")
                  return {"headers": [], "rows": []}

              # Use the largest table (most rows) as it's likely the schedule
              table = max(tables, key=lambda t: len(t.find_all("tr")))

              headers = []
              thead = table.find("thead")
              if thead:
                  headers = [th.get_text(strip=True) for th in thead.find_all(["th", "td"])]
              if not headers:
                  first_row = table.find("tr")
                  if first_row:
                      headers = [td.get_text(strip=True) for td in first_row.find_all(["th", "td"])]

              rows = []
              tbody = table.find("tbody") or table
              for tr in tbody.find_all("tr"):
                  cells = [td.get_text(strip=True) for td in tr.find_all(["td", "th"])]
                  if cells and any(c.strip() for c in cells):
                      rows.append(cells)

              print(f"  Parsed: {len(headers)} headers, {len(rows)} rows")
              if headers:
                  print(f"  Headers: {headers[:8]}")
              return {"headers": headers, "rows": rows}

          with sync_playwright() as pw:
              browser = pw.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
              )
              page = context.new_page()

              # ── Step 1: Load the home page ──────────────────
              print("Loading KillerSports...")
              page.goto("https://killersports.com", wait_until="networkidle", timeout=60000)
              time.sleep(2)
              page.screenshot(path="01_home.png")

              # ── Step 2: Click Login button to open modal ────
              print("Opening login modal...")
              page.evaluate("$('.modal-login').fadeIn()")
              time.sleep(1)
              page.screenshot(path="02_modal.png")

              # ── Step 3: Fill credentials ────────────────────
              print("Filling credentials...")
              # Find email/username field inside the modal
              page.fill(".modal-login input[type='email'], .modal-login input[name='email'], .modal-login input[name='username'], .modal-login input[type='text']", username)
              page.fill(".modal-login input[type='password']", password)
              page.screenshot(path="03_filled.png")

              # ── Step 4: Dismiss cookie consent banner ───────
              try:
                  page.evaluate("document.getElementById('__abconsent-cmp')?.remove()")
                  print("Cookie consent dismissed")
              except:
                  pass
              time.sleep(0.5)

              # ── Step 5: Submit ──────────────────────────────
              print("Submitting login...")
              page.click(".modal-login .button-primary")
              time.sleep(4)
              page.screenshot(path="04_after_login.png")

              # Check if logged in by looking for "My Account" in nav
              content = page.content()
              if "My Account" in content:
                  print("✓ Login successful!")
              else:
                  print("✗ Login may have failed — 'My Account' not found in page")

              # ── Step 5: Scrape active schedule pages ────────
              mlb_data  = scrape_schedule(page, "mlb",  "https://killersports.com/saved-trend-alerts?filter=MLB")
              wnba_data = scrape_schedule(page, "wnba", "https://killersports.com/saved-trend-alerts?filter=WNBA")

              browser.close()

          # ── Write data.json ──────────────────────────────────
          out = {
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "mlb":  mlb_data,
              "wnba": wnba_data
          }

          with open("data.json", "w") as f:
              json.dump(out, f, indent=2)

          print(f"\nDone — MLB: {len(mlb_data['rows'])} rows, WNBA: {len(wnba_data['rows'])} rows")
          EOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: KillerSports refresh $(date -u +%Y-%m-%d)"
          git push

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
